name: daily_expense_tracker
description: A fully functional, production-ready Daily Expense Tracker app in Flutter using GetX state management, GetStorage for persistent local data, and FlChart for elegant interactive charts.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  get: ^4.6.6
  get_storage: ^2.1.1
  fl_chart: ^0.66.0
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/appp.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/appp.png"

  min_sdk_android: 21

